<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Liams Dashboard</title>
<script src="lock.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px 60px;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
  z-index: -1;
}
@keyframes drift {
  0%   { transform: translate3d(0, 0, 0); }
  100% { transform: translate3d(-22px, 14px, 0); }
}

.page { max-width: 1100px; margin: 0 auto; }

.dash-title {
  margin: 0 0 20px;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

/* ===== Bento Grid ===== */
.bento-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 168px;
  gap: 14px;
  grid-auto-flow: dense;
}

.tile {
  --accent: #6BE3A4;
  display: flex;
  flex-direction: column;
  padding: 18px;
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.07);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  text-decoration: none;
  color: var(--text-primary);
  position: relative;
  overflow: hidden;
  transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
  -webkit-tap-highlight-color: transparent;
}
.tile:hover {
  transform: translateY(-3px);
  border-color: var(--accent);
  background: rgba(255, 255, 255, 0.06);
}
.tile:hover .tile-arrow { transform: translateX(4px); }
.tile:active { transform: translateY(-1px); }

.tile.big  { grid-column: span 2; grid-row: span 2; }
.tile.wide { grid-column: span 2; }

.tile-num {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-tertiary);
  letter-spacing: 0.06em;
  flex-shrink: 0;
}

.tile-icon {
  position: absolute;
  top: 16px; right: 16px;
  font-size: 30px;
  line-height: 1;
  filter: drop-shadow(0 0 10px var(--accent));
  pointer-events: none;
}
.tile.big .tile-icon { font-size: 42px; top: 20px; right: 20px; }

.tile-spacer { flex: 1; }

.tile-title {
  font-size: 19px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.01em;
  margin-bottom: 5px;
}
.tile.big .tile-title { font-size: 26px; margin-bottom: 8px; }

.tile-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.tile-sub {
  font-size: 11.5px;
  color: var(--text-tertiary);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.tile.big .tile-sub { font-size: 13px; }

.tile-arrow {
  font-size: 15px;
  color: var(--accent);
  font-weight: 700;
  flex-shrink: 0;
  transition: transform 0.18s ease;
  line-height: 1;
}

/* ===== Responsive ===== */
@media (max-width: 720px) {
  .bento-grid {
    grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: 130px;
    gap: 10px;
  }
  .tile.big { grid-row: span 1; }
  .tile-icon { font-size: 24px; }
  .tile.big .tile-icon { font-size: 28px; }
  .tile.big .tile-title { font-size: 20px; }
}

@media (max-width: 440px) {
  .bento-grid {
    grid-template-columns: 1fr;
    grid-auto-rows: 110px;
    gap: 8px;
  }
  .tile.big, .tile.wide { grid-column: span 1; grid-row: span 1; }
  .tile.big .tile-title { font-size: 18px; }
  .tile.big .tile-icon { font-size: 24px; }
}
</style>
</head>
<body>
<div class="page">
  <h1 class="dash-title">Dashboard</h1>

  <div class="bento-grid">

    <a href="main.html" class="tile big" style="--accent: #6BE3A4">
      <span class="tile-num">·01</span>
      <span class="tile-icon">🏠</span>
      <div class="tile-spacer"></div>
      <div class="tile-title">Main</div>
      <div class="tile-footer">
        <span class="tile-sub">Goals &amp; daily plan</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <a href="gym.html" class="tile wide" style="--accent: #7DD3FC">
      <span class="tile-num">·02</span>
      <span class="tile-icon">💪</span>
      <div class="tile-spacer"></div>
      <div class="tile-title">Fitness</div>
      <div class="tile-footer">
        <span class="tile-sub">Workouts, splits, sessions</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <a href="health.html" class="tile" style="--accent: #A7F3D0">
      <span class="tile-num">·03</span>
      <span class="tile-icon">💊</span>
      <div class="tile-spacer"></div>
      <div class="tile-title">Health</div>
      <div class="tile-footer">
        <span class="tile-sub">Supplements &amp; vitals</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <a href="po-water.html" class="tile" style="--accent: #60A5FA">
      <span class="tile-num">·04</span>
      <span class="tile-icon">💧</span>
      <div class="tile-spacer"></div>
      <div class="tile-title">Water</div>
      <div class="tile-footer">
        <span class="tile-sub">Hydration</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <a href="finance.html" class="tile wide" style="--accent: #F2C063">
      <span class="tile-num">·05</span>
      <span class="tile-icon">📊</span>
      <div class="tile-spacer"></div>
      <div class="tile-title">Finance</div>
      <div class="tile-footer">
        <span class="tile-sub">Net worth &amp; spending</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

  </div>
</div>
</body>
</html>
